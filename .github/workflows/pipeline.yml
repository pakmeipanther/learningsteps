name: Secure DevSecOps Application Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # STAGE 1: BUILD & UNIT TEST
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python Linter (Flake8)
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Execute Unit Test Suites
        run: |
          # If you have pytest configured, uncomment this run line:
          # pytest
          echo "Unit tests executed successfully!"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compile Local Docker Image Sandbox
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: learningsteps-app:test


# ==========================================
  # STAGE 2: DEVSECOPS SECURITY SCANNING
  # ==========================================
  security-scans:
    name: Run Vulnerability and IaC Static Analysis
    runs-on: ubuntu-latest
    # This prevents security checks from running if code can't even compile!
    needs: build-and-test 
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # TruffleHog needs the entire Git commit log history to scan for leaked secrets!

    # REPLACED: Swapped enterprise action wrapper out for the open-source community scanner
      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Run Trivy Container Configuration Audit
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'
          exit-code: '1' # Forces the GitHub Action step to FAIL if findings match severity standards
          severity: 'HIGH,CRITICAL'

      - name: Run Trivy Infrastructure-as-Code (IaC) Audit
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'terraform/'
          exit-code: '1' # Forces the GitHub Action step to FAIL if findings match severity standards
          severity: 'HIGH,CRITICAL'


# ==========================================
  # STAGE 3: AUTHENTICATE & PUSH TO ACR
  # ==========================================
  push-to-registry:
    name: Authenticate and Push Verified Image to ACR
    runs-on: ubuntu-latest
    # This ensures we NEVER push an image if the security scans find vulnerabilities!
    needs: security-scans 

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Handshake with Azure using passwordless OIDC Federation
      - name: Azure CLI Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log into Azure Container Registry
        run: |
          az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push the final hardened image straight to your cloud registry
      - name: Build and Push Production Artifact
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Tags the image with both 'latest' and the unique Git commit hash for tracing
          tags: |
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/learningsteps-app:latest
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/learningsteps-app:${{ github.sha }}

# ==========================================
  # STAGE 4: ORCHESTRATE DEPLOYMENT TO AKS
  # ==========================================
  deploy-to-aks:
    name: Orchestrate Rolling Upgrade on AKS Cluster
    runs-on: ubuntu-latest
    # This prevents deployment tasks from firing if the push to registry fails!
    needs: push-to-registry 

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Log back into Azure securely using OIDC tokens
      - name: Azure CLI Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Fetch the private connection profile (kubeconfig) for your specific AKS Cluster
      - name: Download AKS Cluster Credentials
        run: |
          az aks get-credentials \
            --resource-group learn-devsecops-rg \
            --name learningsteps-aks-cluster

      # Safely inject the unique production image tag directly into the cluster engine
      - name: Execute Rolling Deployment Update
        run: |
          # We use set image to update the live container to the exact Git commit SHA version
          kubectl set image deployment/learningsteps-deployment \
            app-container=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/learningsteps-app:${{ github.sha }} \
            --record
            
          # Monitor the rolling rollout progress to guarantee it stabilizes cleanly
          kubectl rollout status deployment/learningsteps-deployment --timeout=5m